# Default values for deps-frontend.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  path: /deps-platform/deps-frontend
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

resources: {}

settings: {}

helm:
  helm_logs_job_enabled: false

csi:
  vault_namespace: 'k8s-other'
  roleName: 'k8s-other'
  vaultKubernetesMountPath: 'kubernetes-other'

service_account:
  serviceAccountName: 'deps-other'
