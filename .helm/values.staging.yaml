# Default values for deps-frontend.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  path: /deps-platform/deps-frontend
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

resources: {}
  # limits:
  #   cpu:
  #   memory:
  # requests:
  #   cpu:
  #   memory:

settings: {}

helm:
  helm_logs_job_enabled: false

frontend_settings:
  FEATURE_LLM_DATA_EXTRACTION: true
  FEATURE_CONSOLIDATED_DOCUMENT_TYPE_FIELDS: true

csi:
  vault_namespace: 'k8s-staging'
  roleName: 'k8s-staging'
  vaultKubernetesMountPath: 'kubernetes-staging'

service_account:
  serviceAccountName: 'deps-staging'
